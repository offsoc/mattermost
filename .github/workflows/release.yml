name: Release Mattermost

on:
  workflow_run:
    workflows: ["Build Mattermost"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.event.workflow_run.head_branch }}
        tag_name: v${{ github.event.workflow_run.run_number }}
        draft: false
        prerelease: false
        files: |
          artifacts/mattermost-linux-amd64/mattermost
          artifacts/mattermost-linux-amd64/mmctl
          artifacts/mattermost-linux-arm64/mattermost
          artifacts/mattermost-linux-arm64/mmctl
          artifacts/mattermost-darwin-amd64/mattermost
          artifacts/mattermost-darwin-amd64/mmctl
          artifacts/mattermost-darwin-arm64/mattermost
          artifacts/mattermost-darwin-arm64/mmctl
      env:
        GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }} 
