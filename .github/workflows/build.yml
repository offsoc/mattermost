name: Build and Release Mattermost

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Define the runner OS here, outside the matrix include
    strategy:
      matrix:
        # Define the permutations for platform and arch directly in the matrix
        # Or if you need different OS's, 'os' would go here as a variable.
        # Since 'runs-on' is fixed to ubuntu-latest, we only need platform/arch variations.
        include:
          - platform: linux
            arch: amd64
            artifact_name: mattermost-linux-amd64
          - platform: linux
            arch: arm64
            artifact_name: mattermost-linux-arm64

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.7'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Build Mattermost
      env:
        BUILD_ENTERPRISE: true
        GOOS: ${{ matrix.platform }}
        GOARCH: ${{ matrix.arch }}
      run: |
        cd server
        make build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mattermost
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mmctl
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        tag_name: v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          artifacts/mattermost-linux-amd64/mattermost
          artifacts/mattermost-linux-amd64/mmctl
          artifacts/mattermost-linux-arm64/mattermost
          artifacts/mattermost-linux-arm64/mmctl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
