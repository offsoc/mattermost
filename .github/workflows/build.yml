name: Build and Release Mattermost

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact_name: mattermost-linux-amd64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact_name: mattermost-linux-arm64
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact_name: mattermost-darwin-amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: mattermost-darwin-arm64

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd server
        make dependencies

    - name: Build Mattermost
      env:
        BUILD_ENTERPRISE: true
        GOOS: ${{ matrix.platform }}
        GOARCH: ${{ matrix.arch }}
      run: |
        cd server
        make build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mattermost
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mmctl
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        tag_name: v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          artifacts/mattermost-linux-amd64/mattermost
          artifacts/mattermost-linux-amd64/mmctl
          artifacts/mattermost-linux-arm64/mattermost
          artifacts/mattermost-linux-arm64/mmctl
          artifacts/mattermost-darwin-amd64/mattermost
          artifacts/mattermost-darwin-amd64/mmctl
          artifacts/mattermost-darwin-arm64/mattermost
          artifacts/mattermost-darwin-arm64/mmctl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
