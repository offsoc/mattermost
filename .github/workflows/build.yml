name: Build Mattermost

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact_name: mattermost-linux-amd64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact_name: mattermost-linux-arm64
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact_name: mattermost-darwin-amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: mattermost-darwin-arm64

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd server
        make dependencies

    - name: Build Mattermost
      env:
        BUILD_ENTERPRISE: true
        GOOS: ${{ matrix.platform }}
        GOARCH: ${{ matrix.arch }}
      run: |
        cd server
        make build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mattermost
          server/bin/${{ matrix.platform }}_${{ matrix.arch }}/mmctl
        if-no-files-found: error 
